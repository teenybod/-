{% extends "base.html" %}
{% block title %}记录查询 - 物料效期管理系统{% endblock %}
{% block page_title %}记录查询{% endblock %}

{% block content %}
<div class="card mb-3">
    <div class="card-body d-flex justify-content-between align-items-center">
        <div class="text-muted small mb-0">
            <i class="bi bi-info-circle"></i> 查看物料的使用、灭菌和更换历史记录
        </div>
        <button class="btn btn-outline-success btn-sm" onclick="exportCurrent()">
            <i class="bi bi-file-earmark-excel"></i> 导出当前记录
        </button>
    </div>
</div>

<ul class="nav nav-tabs mb-3" id="logTab">
    <li class="nav-item">
        <a class="nav-link active" href="#" onclick="switchTab('usage', this)">使用记录</a>
    </li>
    <li class="nav-item">
        <a class="nav-link" href="#" onclick="switchTab('sterilization', this)">灭菌记录</a>
    </li>
    <li class="nav-item">
        <a class="nav-link" href="#" onclick="switchTab('replacement', this)">更换记录</a>
    </li>
</ul>

<div class="card">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0" id="logTable">
                <thead>
                    <tr id="logHeader">
                        <th>物料编码</th>
                        <th>工序</th>
                        <th>型号</th>
                        <th>登记时间</th>
                        <th>备注</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let currentTab = 'usage';

$(document).ready(function() {
    loadLogs();
});

function switchTab(tab, el) {
    currentTab = tab;
    $('#logTab .nav-link').removeClass('active');
    $(el).addClass('active');
    loadLogs();
}

function loadLogs() {
    let url, headers, timeField;
    if (currentTab === 'usage') {
        url = '/api/records/usage';
        headers = ['物料编码', '工序', '型号', '登记时间', '备注'];
        timeField = 'usage_date';
    } else if (currentTab === 'sterilization') {
        url = '/api/records/sterilization';
        headers = ['物料编码', '工序', '型号', '登记时间', '备注'];
        timeField = 'sterilization_date';
    } else {
        url = '/api/records/replacement';
        headers = ['物料编码', '工序', '型号', '旧启用日期', '新启用日期', '旧使用次数', '旧灭菌次数', '更换时间', '操作人'];
        timeField = 'replaced_at';
    }

    // 更新表头
    const theadTr = $('#logHeader');
    theadTr.empty();
    headers.forEach(h => theadTr.append(`<th>${h}</th>`));

    $.get(url, function(res) {
        const tbody = $('#logTable tbody');
        tbody.empty();
        if (res.length === 0) {
            tbody.append(`<tr><td colspan="${headers.length}" class="text-center text-muted py-4">暂无记录</td></tr>`);
            return;
        }
        res.forEach(item => {
            let row;
            if (currentTab === 'replacement') {
                row = `
                    <tr>
                        <td><strong>${item.filter_code}</strong></td>
                        <td>${item.process_name}</td>
                        <td>${item.filter_model}</td>
                        <td>${item.old_start_date}</td>
                        <td>${item.new_start_date}</td>
                        <td>${item.old_usage_count}</td>
                        <td>${item.old_sterilization_count}</td>
                        <td>${item.replaced_at}</td>
                        <td>${item.replaced_by || '-'}</td>
                    </tr>
                `;
            } else {
                row = `
                    <tr>
                        <td><strong>${item.filter_code}</strong></td>
                        <td>${item.process_name}</td>
                        <td>${item.filter_model}</td>
                        <td>${item[timeField]}</td>
                        <td>${item.note || '-'}</td>
                    </tr>
                `;
            }
            tbody.append(row);
        });
    });
}

function exportCurrent() {
    window.open(`/api/export/records?type=${currentTab}`, '_blank');
}
</script>
{% endblock %}
